<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cybersecurity Portfolio</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <div class="container">
            <h1 id="name"></h1>
            <h2 id="title"></h2>
            <p id="summary"></p>

            <div class="social-links">
                <a id="linkedin" target="_blank">LinkedIn</a>
                <a id="github" target="_blank">GitHub</a>
            </div>
        </div>
    </header>

    <section id="education">
        <div class="container">
            <h2>Education</h2>
            <div id="educationContainer"></div>
        </div>
    </section>

    <section id="skills">
        <div class="container">
            <h2>Technical Skills</h2>
            <div id="technicalSkillsContainer"></div>
        </div>
    </section>

    <section id="interpersonal">
        <div class="container">
            <h2>Interpersonal Skills</h2>
            <div id="interpersonalContainer" class="badge-container"></div>
        </div>
    </section>

    <section id="experience">
        <div class="container">
            <h2>Experience</h2>
            <div id="experienceContainer"></div>
        </div>
    </section>

    <section id="projects">
        <div class="container">
            <h2>Projects</h2>
            <div id="projectsContainer"></div>
        </div>
    </section>

    <section id="languages">
        <div class="container">
            <h2>Languages</h2>
            <div id="languagesContainer" class="badge-container"></div>
        </div>
    </section>

    <footer>
        <p>© 2026 Portfolio</p>
    </footer>

    <script src="./script.js"></script>

</body>

</html>
